<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMTiles Raster and Vector Layers</title>
    <script src="https://cdn.jsdelivr.net/npm/ol@v9.0.0/dist/ol.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v9.0.0/ol.css">
    <script src="https://unpkg.com/ol-pmtiles@2.0.2/dist/olpmtiles.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <label>
            <input type="checkbox" id="rasterLayerCheckbox" checked>
            Raster Layer
        </label>
        <br>
        <label>
            <input type="checkbox" id="vectorLayerCheckbox" checked>
            Vector Layer
        </label>
    </div>
    <script type="text/javascript">

        // Custom style function for vector layer with labels
        const vectorStyleFunction = function(feature) {
            const geometryType = feature.getGeometry().getType();
            const properties = feature.getProperties();
            const label = properties.name || properties.street || properties.label || ''; // Change these property names according to your data
            let style;

            const textStyle = new ol.style.Text({
                font: '12px Calibri,sans-serif',
                overflow: true,
                fill: new ol.style.Fill({
                    color: '#000'
                }),
                stroke: new ol.style.Stroke({
                    color: '#fff',
                    width: 3
                }),
                text: label
            });

            if (geometryType === 'Point' || geometryType === 'MultiPoint') {
                style = new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: 5,
                        fill: new ol.style.Fill({color: 'rgba(255, 255, 255, 0.8)'}),
                        stroke: new ol.style.Stroke({color: 'rgba(0, 0, 0, 0.8)', width: 1})
                    }),
                    text: textStyle
                });
            } else if (geometryType === 'LineString' || geometryType === 'MultiLineString') {
                style = new ol.style.Style({
                    stroke: new ol.style.Stroke({
                        color: 'rgba(0, 0, 0, 0.8)',
                        width: 2
                    }),
                    text: textStyle
                });
            } else if (geometryType === 'Polygon' || geometryType === 'MultiPolygon') {
                style = new ol.style.Style({
                    fill: new ol.style.Fill({
                        color: 'rgba(255, 255, 255, 0.6)'
                    }),
                    stroke: new ol.style.Stroke({
                        color: 'rgba(0, 0, 0, 0.8)',
                        width: 2
                    }),
                    text: textStyle
                });
            }

            return style;
        };


        // Initialize vector tile layer
        const vectorLayer = new ol.layer.VectorTile({
            declutter: true,
            source: new olpmtiles.PMTilesVectorSource({
                url: 'https://shaded-maps-dzi.s3.amazonaws.com/winnipeg_osm.pmtiles',
                attributions: ["Vector Layer"]
            }),
            style: vectorStyleFunction
        });

        // Initialize raster layer
        const rasterLayer = new ol.layer.WebGLTile({
            source: new olpmtiles.PMTilesRasterSource({
                url: 'https://r2-public.protomaps.com/protomaps-sample-datasets/terrarium_z9.pmtiles',
                attributions: ["Raster Layer"],
                //tileSize: [512, 512]
            })
        });


        ol.proj.useGeographic();

        // Initialize the map
        const map = new ol.Map({
            target: 'map',
            layers: [rasterLayer, vectorLayer],
            view: new ol.View({
                center: [-97.140200, 49.894677], // Winnipeg coordinates
                zoom: 14,
                maxZoom: 18
            })
        });

        // Handle checkbox changes
        document.getElementById('rasterLayerCheckbox').addEventListener('change', function() {
            rasterLayer.setVisible(this.checked);
        });

        document.getElementById('vectorLayerCheckbox').addEventListener('change', function() {
            vectorLayer.setVisible(this.checked);
        });
    </script>
</body>
</html>
